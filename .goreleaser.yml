version: 2

project_name: af

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: af
    binary: af
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

brews:
  - repository:
      owner: altfins-com
      name: homebrew-tap
    directory: Formula
    homepage: https://altfins.com
    description: altFINS CLI for market data, analytics, signals, and TUI workflows
    license: MIT

winget:
  - name: af
    ids:
      - af
    package_name: altFINS CLI
    package_identifier: altfins.af
    publisher: altFINS
    publisher_url: https://altfins.com
    publisher_support_url: https://github.com/altfins-com/altfins-cli/issues
    homepage: https://altfins.com
    short_description: altFINS CLI for market data, analytics, signals, and TUI workflows
    description: Terminal-native altFINS client for market data, analytics, signals, news, and TUI workflows.
    license: MIT
    copyright: altFINS
    tags:
      - crypto
      - cli
      - trading
      - analytics
      - tui
    repository:
      owner: "{{ if .Env.WINGET_OWNER }}{{ .Env.WINGET_OWNER }}{{ else }}feci{{ end }}"
      name: winget-pkgs
      branch: "altfins-af-{{ .Version }}"
      pull_request:
        enabled: true
        draft: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
    commit_author:
      name: Tomas Fecko
      email: tomas.fecko@altfins.com
    skip_upload: "{{ if ne .Env.WINGET_PUBLISH \"1\" }}true{{ else }}false{{ end }}"
